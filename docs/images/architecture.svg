<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="archAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#archBg)" rx="12"/>
  <text x="400" y="35" font-family="Segoe UI,Arial,sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">Architecture Overview</text>
  <rect x="2" y="45" width="796" height="3" fill="url(#archAccent)" opacity="0.5"/>

  <!-- User Interfaces (top row) -->
  <rect x="30" y="70" width="160" height="80" rx="10" fill="#161b22" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="100" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#667eea" text-anchor="middle" font-weight="bold">CLI Interface</text>
  <text x="110" y="120" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Click + Rich</text>
  <text x="110" y="136" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Terminal UI</text>

  <rect x="220" y="70" width="160" height="80" rx="10" fill="#161b22" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="100" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#667eea" text-anchor="middle" font-weight="bold">Web UI</text>
  <text x="300" y="120" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Streamlit</text>
  <text x="300" y="136" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Browser Interface</text>

  <rect x="410" y="70" width="160" height="80" rx="10" fill="#161b22" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <text x="490" y="100" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#667eea" text-anchor="middle" font-weight="bold">REST API</text>
  <text x="490" y="120" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">FastAPI</text>
  <text x="490" y="136" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Swagger Docs</text>

  <!-- Arrows down to core -->
  <line x1="110" y1="150" x2="400" y2="200" stroke="#667eea" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="300" y1="150" x2="400" y2="200" stroke="#667eea" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="490" y1="150" x2="400" y2="200" stroke="#667eea" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Core Engine (center) -->
  <rect x="270" y="195" width="260" height="90" rx="10" fill="#161b22" stroke="#764ba2" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="400" y="225" font-family="Segoe UI,Arial,sans-serif" font-size="16" fill="#764ba2" text-anchor="middle" font-weight="bold">Core Diagnosis Engine</text>
  <text x="400" y="248" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Differential Generation · Ranking</text>
  <text x="400" y="266" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Workup · Comparison · Session Tracking</text>

  <!-- Arrow down to Ollama -->
  <line x1="400" y1="285" x2="400" y2="320" stroke="#667eea" stroke-width="2"/>
  <polygon points="397,318 400,326 403,318" fill="#667eea"/>

  <!-- Ollama (bottom center) -->
  <rect x="270" y="325" width="260" height="60" rx="10" fill="#667eea" opacity="0.1" stroke="#667eea" stroke-width="1.5"/>
  <text x="400" y="352" font-family="Segoe UI,Arial,sans-serif" font-size="15" fill="#667eea" text-anchor="middle" font-weight="bold">Ollama + Gemma 4</text>
  <text x="400" y="372" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Local LLM Inference · 100% Private</text>

  <!-- HIPAA badge -->
  <rect x="620" y="70" width="150" height="60" rx="10" fill="#161b22" stroke="#22c55e" stroke-width="1.5"/>
  <text x="695" y="97" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="bold">🔒 HIPAA-Friendly</text>
  <text x="695" y="117" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">No data leaves machine</text>

  <!-- Session Tracker (right) -->
  <rect x="620" y="200" width="150" height="70" rx="10" fill="#161b22" stroke="#667eea" stroke-width="1"/>
  <text x="695" y="228" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#667eea" text-anchor="middle" font-weight="bold">Session Tracker</text>
  <text x="695" y="248" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">DiagnosisSession</text>
  <text x="695" y="260" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">History &amp; Summary</text>

  <line x1="530" y1="240" x2="620" y2="240" stroke="#667eea" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
