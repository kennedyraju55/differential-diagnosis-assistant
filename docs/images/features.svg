<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="featBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="featAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#featBg)" rx="12"/>
  <text x="400" y="38" font-family="Segoe UI,Arial,sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">Key Features</text>
  <rect x="300" y="48" width="200" height="3" fill="url(#featAccent)" rx="2"/>

  <!-- Row 1 -->
  <rect x="30" y="65" width="235" height="110" rx="10" fill="#161b22" stroke="#667eea" stroke-width="1.5"/>
  <text x="50" y="95" font-family="Segoe UI,Arial,sans-serif" font-size="20">📋</text>
  <text x="78" y="97" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Ranked Differentials</text>
  <text x="45" y="123" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">AI-generated ranked differential</text>
  <text x="45" y="140" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">diagnoses with supporting evidence</text>
  <rect x="30" y="167" width="235" height="6" rx="3" fill="#667eea" opacity="0.15"/>

  <rect x="285" y="65" width="235" height="110" rx="10" fill="#161b22" stroke="#667eea" stroke-width="1.5"/>
  <text x="305" y="95" font-family="Segoe UI,Arial,sans-serif" font-size="20">🔍</text>
  <text x="333" y="97" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Multi-System Analysis</text>
  <text x="300" y="123" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">Covers 8 body systems including</text>
  <text x="300" y="140" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">cardiovascular, neuro, GI, and more</text>
  <rect x="285" y="167" width="235" height="6" rx="3" fill="#667eea" opacity="0.15"/>

  <rect x="540" y="65" width="235" height="110" rx="10" fill="#161b22" stroke="#667eea" stroke-width="1.5"/>
  <text x="560" y="95" font-family="Segoe UI,Arial,sans-serif" font-size="20">🧪</text>
  <text x="588" y="97" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Workup Recommendations</text>
  <text x="555" y="123" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">Suggested diagnostic workup with</text>
  <text x="555" y="140" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">first-line and second-line tests</text>
  <rect x="540" y="167" width="235" height="6" rx="3" fill="#667eea" opacity="0.15"/>

  <!-- Row 2 -->
  <rect x="30" y="195" width="235" height="110" rx="10" fill="#161b22" stroke="#667eea" stroke-width="1.5"/>
  <text x="50" y="225" font-family="Segoe UI,Arial,sans-serif" font-size="20">🔒</text>
  <text x="78" y="227" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold">HIPAA-Friendly</text>
  <text x="45" y="253" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">100% local processing — no patient</text>
  <text x="45" y="270" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">data ever leaves your machine</text>
  <rect x="30" y="297" width="235" height="6" rx="3" fill="#667eea" opacity="0.15"/>

  <rect x="285" y="195" width="235" height="110" rx="10" fill="#161b22" stroke="#667eea" stroke-width="1.5"/>
  <text x="305" y="225" font-family="Segoe UI,Arial,sans-serif" font-size="20">⚡</text>
  <text x="333" y="227" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold">REST API</text>
  <text x="300" y="253" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">FastAPI with Swagger docs for</text>
  <text x="300" y="270" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">programmatic integration</text>
  <rect x="285" y="297" width="235" height="6" rx="3" fill="#667eea" opacity="0.15"/>

  <rect x="540" y="195" width="235" height="110" rx="10" fill="#161b22" stroke="#667eea" stroke-width="1.5"/>
  <text x="560" y="225" font-family="Segoe UI,Arial,sans-serif" font-size="20">🐳</text>
  <text x="588" y="227" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Docker Ready</text>
  <text x="555" y="253" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">One-command deployment with</text>
  <text x="555" y="270" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">Docker Compose + Ollama sidecar</text>
  <rect x="540" y="297" width="235" height="6" rx="3" fill="#667eea" opacity="0.15"/>
</svg>
